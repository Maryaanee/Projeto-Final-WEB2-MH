{% load static %}
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entrar no Sistema</title>
    <style>
        /* Reset básico de estilos */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Arial', sans-serif;
        }

        body {
            background-color: #000;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* Imagem de fundo com o mosaico de filmes e escurecimento */
        body::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            /* Imagem genérica de cinema. Se tiver uma própria, mude a URL abaixo */
            background: linear-gradient(rgba(0, 0, 0, 0.75), rgba(0, 0, 0, 0.75)), 
                        url('https://images.unsplash.com/photo-1489599849927-2ee91cede3ba?q=80&w=1920') no-repeat center center;
            background-size: cover;
            z-index: 1;
        }

        /* Centraliza e dá formato aos blocos principais */
        form, h2, body > p {
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        /* Título do Sistema */
        h2 {
            color: #ffffff;
            font-size: 1.8rem;
            margin-bottom: 25px;
            text-shadow: 1px 1px 4px rgba(0, 0, 0, 0.8);
            font-weight: bold;
            letter-spacing: 0.5px;
        }

        /* Estrutura dos parágrafos do formulário {{ form.as_p }} */
        form p {
            width: 100%;
            margin-bottom: 15px;
        }

        /* Oculta as labels automáticas do Django para manter o visual limpo */
        form p label {
            display: none;
        }

        /* Estilização das caixas de texto (Inputs gerados pelo Django) */
        form p input {
            width: 100%;
            padding: 14px 20px;
            background-color: rgba(255, 255, 255, 0.1); /* Efeito transparente */
            border: 2px solid rgba(255, 255, 255, 0.7); /* Borda oval branca fina */
            border-radius: 30px; /* Formato de pílula idêntico à imagem */
            color: #fff;
            font-size: 1.1rem;
            outline: none;
            transition: all 0.3s ease;
            text-align: center; /* Centraliza o texto digitado */
        }

        /* Feedback visual ao clicar no input */
        form p input:focus {
            background-color: rgba(255, 255, 255, 0.2);
            border-color: #fff;
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.2);
        }

        /* Altera a cor do texto de exemplo (placeholder) caso o Django use */
        form p input::placeholder {
            color: rgba(255, 255, 255, 0.7);
        }

        /* Botão de Acessar (Vermelho Escuro) */
        form button[type="submit"] {
            display: block;
            width: 60%; /* Menor que os inputs, assim como no modelo */
            margin: 25px auto 10px auto;
            padding: 12px;
            background-color: #a61c1c; /* Tom vermelho escuro da foto */
            color: #fff;
            border: none;
            border-radius: 30px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.4);
            transition: background-color 0.2s ease, transform 0.1s ease;
        }

        /* Efeitos do botão */
        form button[type="submit"]:hover {
            background-color: #bd2424;
        }

        form button[type="submit"]:active {
            transform: scale(0.98);
        }

        /* Texto de Cadastro (Não tem conta? Cadastre-se) */
        body > p {
            margin-top: 20px;
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.95rem;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.6);
        }

        /* Link do Cadastro */
        body > p a {
            color: #fff;
            text-decoration: none;
            font-weight: bold;
            transition: color 0.2s ease;
        }

        body > p a:hover {
            text-decoration: underline;
            color: #bd2424; /* Destaca em vermelho ao passar o mouse */
        }
    </style>
</head>
<body>

    <h2>Entrar no Sistema</h2>

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Acessar</button>
    </form>
    
    <p>Não tem conta? <a href="{% url 'signup' %}">Cadastre-se</a></p>

</body>
</html>
